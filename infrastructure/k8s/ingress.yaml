---
# -----------------------------------
# INGRESS 1: API Routing (Uses Rewrite Logic)
# -----------------------------------
# The API ingress must be separated from your Core routing because the Rewrite Target 
# annotation operates globally and would break your frontend URL tracking if combined.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress-api
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Enables Regex matching in the path directive
    nginx.ingress.kubernetes.io/use-regex: "true"
    # Strips the `/api` prefix completely before passing the URL stream to FastAPI
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  tls:
  - hosts:
    - transfer.myportfolio.com
    secretName: letsencrypt-prod-tls
  rules:
  - host: transfer.myportfolio.com
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 8000

---
# -----------------------------------
# INGRESS 2: WebSockets & Core Frontend
# -----------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress-core
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # CRITICAL: Prevent Nginx from instantly severeing dormant WebRTC signaling connections 
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    
    # CRITICAL: Force HTTP Upgrade definitions to establish pure WebSocket pipelines
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
  - hosts:
    - transfer.myportfolio.com
    secretName: letsencrypt-prod-tls
  rules:
  - host: transfer.myportfolio.com
    http:
      paths:
      # High Priority WebSocket Pipeline
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: socket-service
            port:
              number: 3001
              
      # Catch-all Route -> React UI Builder
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
